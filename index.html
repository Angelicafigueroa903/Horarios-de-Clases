<!-- MÓDULO: INICIO -->
<div id="inicio" class="module active">
    <div class="bg-white p-12 rounded-3xl shadow-sm border border-gray-200 text-center max-w-4xl mx-auto mt-10">
        <h2 class="text-6xl font-black text-slate-800 mb-2 tracking-tight">¡Bienvenidos al sistema de horarios!</h2>
        <!-- Nombre de la institución con estilo mejorado -->
        <h3 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 italic mb-12">
            Institución Educativa San Miguel
        </h3>
        
        <!-- Contenedor del Logo con funcionalidad de carga -->
        <div class="flex flex-col items-center justify-center space-y-6">
            <div id="logo-container" class="w-64 h-64 bg-slate-50 rounded-full border-4 border-dashed border-blue-200 flex items-center justify-center overflow-hidden shadow-inner relative group">
                <img id="logo-preview" src="" class="hidden w-full h-full object-contain p-4">
                <div id="logo-placeholder" class="text-slate-300 flex flex-col items-center">
                    <i class="fas fa-image text-7xl mb-2"></i>
                    <p class="text-xs font-bold uppercase tracking-widest">Logo Institucional</p>
                </div>
            </div>

            <div class="flex space-x-4">
                <label for="logo-upload" class="cursor-pointer bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition-all shadow-lg flex items-center">
                    <i class="fas fa-upload mr-2"></i> Subir Logo
                </label>
                <input type="file" id="logo-upload" class="hidden" accept="image/*" onchange="previewLogo(event)">
                
                <button onclick="removeLogo()" id="btn-remove-logo" class="hidden bg-red-100 text-red-600 px-6 py-3 rounded-full font-bold hover:bg-red-200 transition-all flex items-center border border-red-200">
                    <i class="fas fa-trash-alt mr-2"></i> Cambiar/Quitar
                </button>
            </div>
            <p class="text-slate-400 text-xs italic">Formatos permitidos: PNG, JPG o SVG.</p>
        </div>
    </div>
</div>

<script>
    // Lógica para el Logo
    function previewLogo(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('logo-preview');
            const placeholder = document.getElementById('logo-placeholder');
            const btnRemove = document.getElementById('btn-remove-logo');
            
            output.src = reader.result;
            output.classList.remove('hidden');
            placeholder.classList.add('hidden');
            btnRemove.classList.remove('hidden');
            
            // Guardar en localStorage para persistencia local
            localStorage.setItem('schoolLogo', reader.result);
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    function removeLogo() {
        const output = document.getElementById('logo-preview');
        const placeholder = document.getElementById('logo-placeholder');
        const btnRemove = document.getElementById('btn-remove-logo');
        const input = document.getElementById('logo-upload');
        
        output.src = "";
        output.classList.add('hidden');
        placeholder.classList.remove('hidden');
        btnRemove.classList.add('hidden');
        input.value = "";
        localStorage.removeItem('schoolLogo');
    }

    // Cargar logo guardado al iniciar
    window.onload = function() {
        const savedLogo = localStorage.getItem('schoolLogo');
        if (savedLogo) {
            const output = document.getElementById('logo-preview');
            const placeholder = document.getElementById('logo-placeholder');
            const btnRemove = document.getElementById('btn-remove-logo');
            output.src = savedLogo;
            output.classList.remove('hidden');
            placeholder.classList.add('hidden');
            btnRemove.classList.remove('hidden');
        }
    };
</script>
