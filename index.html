<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IE San Miguel - Gestión de Horarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .module { display: none; }
        .module.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px ); } to { opacity: 1; transform: translateY(0); } }
        .sidebar { width: 260px; position: fixed; right: 0; top: 0; height: 100vh; z-index: 50; }
        .content { margin-right: 260px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .module:not(#inicio) { width: 100%; align-self: flex-start; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <!-- MENÚ LATERAL DERECHO -->
    <nav class="sidebar bg-slate-900 text-white p-6 shadow-2xl flex flex-col">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-full mx-auto mb-3 flex items-center justify-center shadow-lg">
                <i class="fas fa-school text-white text-2xl"></i>
            </div>
            <h1 class="text-[10px] font-bold text-blue-400 tracking-widest uppercase">IE San Miguel</h1>
        </div>

        <div class="space-y-2 flex-grow">
            <button onclick="showModule('inicio')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-home w-6"></i> Inicio
            </button>
            <button onclick="showModule('docentes')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-user-tie w-6"></i> Docentes
            </button>
            <button onclick="showModule('asignaturas')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-book w-6"></i> Asignaturas
            </button>
            <button onclick="showModule('horarios-docente')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-calendar-alt w-6"></i> Horarios Docente
            </button>
            <button onclick="showModule('horarios-grado')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-users w-6"></i> Horarios Grado
            </button>
        </div>

        <!-- Botón de Configuración al final -->
        <div class="mt-auto pt-4 border-t border-slate-700">
            <button onclick="showModule('configuracion')" class="w-full flex items-center p-3 rounded-lg hover:bg-red-600 transition-all text-sm group text-red-400">
                <i class="fas fa-cog w-6"></i> Configuración
            </button>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="content p-8">
        
        <!-- MÓDULO: INICIO -->
        <div id="inicio" class="module active w-full text-center">
            <h2 class="text-4xl font-black text-slate-800 mb-4 tracking-tight">¡Bienvenidos al sistema de horarios!</h2>
            <h3 class="text-3xl font-bold text-blue-600 italic mb-6">Institución Educativa San Miguel</h3>
            <div class="w-24 h-1 bg-blue-500 mx-auto rounded-full"></div>
        </div>

        <!-- MÓDULO: DOCENTES -->
        <div id="docentes" class="module max-w-6xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold text-slate-800">Módulo de Docentes</h2>
                    <button onclick="openDocenteForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700">
                        <i class="fas fa-plus mr-2"></i> Nuevo Docente
                    </button>
                </div>

                <div id="docente-form" class="hidden bg-slate-50 p-6 rounded-xl mb-8 border border-slate-200">
                    <h3 id="form-title" class="font-bold mb-4 text-slate-700 text-sm uppercase">Registro de Docente</h3>
                    <input type="hidden" id="edit-index" value="-1">
                    <div class="grid md:grid-cols-3 gap-4">
                        <input type="text" id="doc-id" placeholder="N° Documento" class="p-2 border rounded text-sm">
                        <input type="text" id="doc-name" placeholder="Nombre Completo" class="p-2 border rounded text-sm">
                        <div class="flex gap-2">
                            <button onclick="saveDocente()" class="bg-green-600 text-white p-2 rounded font-bold text-sm hover:bg-green-700 flex-grow">Guardar</button>
                            <button onclick="closeDocenteForm()" class="bg-gray-400 text-white p-2 rounded font-bold text-sm hover:bg-gray-500">Cancelar</button>
                        </div>
                    </div>
                </div>

                <div id="docentes-list" class="space-y-6"></div>
            </div>
        </div>

        <!-- MÓDULO: CONFIGURACIÓN -->
        <div id="configuracion" class="module max-w-4xl mx-auto">
            <div class="bg-white p-12 rounded-3xl shadow-sm border border-red-100 text-center">
                <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-6"></i>
                <h2 class="text-3xl font-bold text-slate-800 mb-4">Zona de Peligro</h2>
                <p class="text-gray-500 mb-8 italic text-lg">Esta acción borrará todos los docentes, asignaturas y horarios registrados. No se puede deshacer.</p>
                <button onclick="resetSystem()" class="bg-red-600 text-white px-10 py-4 rounded-2xl font-black text-lg hover:bg-red-700 shadow-xl transform transition hover:scale-105 active:scale-95">
                    <i class="fas fa-trash-alt mr-2"></i> RESTABLECER DE FÁBRICA
                </button>
            </div>
        </div>

        <!-- OTROS MÓDULOS (Mantener igual que antes) -->
        <div id="asignaturas" class="module max-w-5xl mx-auto"> <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100"><h2 class="text-2xl font-bold text-slate-800">Módulo de Asignaturas</h2></div> </div>
        <div id="horarios-docente" class="module max-w-5xl mx-auto"> <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100"><h2 class="text-2xl font-bold text-slate-400 italic">Horarios Docente</h2></div> </div>
        <div id="horarios-grado" class="module max-w-5xl mx-auto"> <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100"><h2 class="text-2xl font-bold text-slate-400 italic">Horarios Grado</h2></div> </div>

    </main>

    <script>
        let docentes = JSON.parse(localStorage.getItem('sanMiguelDocentes')) || [];

        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const main = document.querySelector('.content');
            main.style.alignItems = (id === 'inicio' || id === 'configuracion') ? 'center' : 'flex-start';
            if(id === 'docentes') renderDocentes();
        }

        // --- FUNCIONES DE DOCENTES ---
        function openDocenteForm(index = -1) {
            document.getElementById('docente-form').classList.remove('hidden');
            if(index >= 0) {
                document.getElementById('form-title').innerText = "Editar Docente";
                document.getElementById('doc-id').value = docentes[index].id;
                document.getElementById('doc-name').value = docentes[index].name;
                document.getElementById('edit-index').value = index;
            } else {
                document.getElementById('form-title').innerText = "Nuevo Registro de Docente";
                document.getElementById('doc-id').value = "";
                document.getElementById('doc-name').value = "";
                document.getElementById('edit-index').value = "-1";
            }
        }

        function closeDocenteForm() { document.getElementById('docente-form').classList.add('hidden'); }

        function saveDocente() {
            const id = document.getElementById('doc-id').value.trim();
            const name = document.getElementById('doc-name').value.trim();
            const editIndex = parseInt(document.getElementById('edit-index').value);

            if(!id || !name) return alert("Por favor completa los campos.");

            if(editIndex === -1) {
                // Nuevo docente
                if(docentes.some(d => d.id === id)) return alert("Este documento ya existe.");
                docentes.push({ id, name, carga: [] });
            } else {
                // Editar docente existente
                docentes[editIndex].id = id;
                docentes[editIndex].name = name;
            }

            localStorage.setItem('sanMiguelDocentes', JSON.stringify(docentes));
            renderDocentes();
            closeDocenteForm();
        }

        function addCarga(docIdx) {
            const subject = prompt("Asignatura:");
            const grade = prompt("Grado:");
            const hours = parseInt(prompt("Horas semanales:"));
            if(subject && grade && hours) {
                docentes[docIdx].carga.push({ subject, grade, hours });
                localStorage.setItem('sanMiguelDocentes', JSON.stringify(docentes));
                renderDocentes();
            }
        }

        function removeCarga(docIdx, cargaIdx) {
            if(confirm("¿Eliminar asignatura?")) {
                docentes[docIdx].carga.splice(cargaIdx, 1);
                localStorage.setItem('sanMiguelDocentes', JSON.stringify(docentes));
                renderDocentes();
            }
        }

        function deleteDocente(index) {
            if(confirm("¿Eliminar permanentemente a este docente?")) {
                docentes.splice(index, 1);
                localStorage.setItem('sanMiguelDocentes', JSON.stringify(docentes));
                renderDocentes();
            }
        }

        function renderDocentes() {
            const container = document.getElementById('docentes-list');
            if(!container) return;
            container.innerHTML = docentes.map((d, docIdx) => {
                const totalH = d.carga.reduce((s, c) => s + c.hours, 0);
                return `
                <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                    <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                        <div>
                            <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">${d.id}</span>
                            <h4 class="font-bold text-lg">${d.name}</h4>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right border-r border-slate-600 pr-4">
                                <span class="text-[10px] block uppercase text-slate-400">Total Horas</span>
                                <span class="text-xl font-black text-blue-400">${totalH}</span>
                            </div>
                            <button onclick="openDocenteForm(${docIdx})" class="text-slate-400 hover:text-white transition-colors"><i class="fas fa-edit"></i></button>
                        </div>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-4">
                            <h5 class="text-xs font-bold text-slate-500 uppercase">Carga Académica</h5>
                            <button onclick="addCarga(${docIdx})" class="text-blue-600 hover:text-blue-800 text-xs font-bold"><i class="fas fa-plus-circle mr-1"></i> Asignar Materia</button>
                        </div>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
                            ${d.carga.map((c, cIdx) => `
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex justify-between items-center">
                                    <div><div class="font-bold text-slate-700 text-sm">${c.subject}</div><div class="text-[10px] text-slate-500 font-bold uppercase">${c.grade} | ${c.hours}h</div></div>
                                    <button onclick="removeCarga(${docIdx}, ${cIdx})" class="text-red-300 hover:text-red-500 p-2"><i class="fas fa-times"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        ${d.carga.length === 0 ? '<p class="text-center text-slate-300 text-xs italic py-4">Sin carga asignada</p>' : ''}
                        <div class="mt-4 pt-4 border-t border-slate-100 text-right">
                            <button onclick="deleteDocente(${docIdx})" class="text-red-400 text-[10px] font-bold uppercase hover:text-red-600">Eliminar Docente</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- SISTEMA ---
        function resetSystem() {
            if(confirm("¡ATENCIÓN! Esto borrará absolutamente TODO. ¿Estás seguro?")) {
                localStorage.clear();
                docentes = [];
                alert("Sistema restablecido de fábrica.");
                location.reload();
            }
        }

        window.onload = () => { renderDocentes(); };
    </script>
</body>
</html>
