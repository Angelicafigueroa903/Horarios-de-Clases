<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IE San Miguel - Gestión de Horarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .module { display: none; }
        .module.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px ); } to { opacity: 1; transform: translateY(0); } }
        .sidebar { width: 260px; position: fixed; right: 0; top: 0; height: 100vh; z-index: 50; }
        .content { margin-right: 260px; min-height: 100vh; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <!-- MENÚ LATERAL DERECHO -->
    <nav class="sidebar bg-slate-900 text-white p-6 shadow-2xl flex flex-col">
        <div class="text-center mb-8">
            <div id="mini-logo-container" class="w-16 h-16 bg-white rounded-full mx-auto mb-3 flex items-center justify-center border-2 border-blue-500 shadow-lg overflow-hidden">
                <img id="mini-logo-preview" src="" class="hidden w-full h-full object-cover">
                <i id="mini-logo-icon" class="fas fa-school text-slate-800 text-2xl"></i>
            </div>
            <h1 class="text-[10px] font-bold text-blue-400 tracking-widest uppercase">IE San Miguel</h1>
        </div>

        <div class="space-y-2">
            <button onclick="showModule('inicio')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-home w-6"></i> Inicio
            </button>
            <button onclick="showModule('docentes')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-user-tie w-6"></i> Docentes
            </button>
            <button onclick="showModule('asignaturas')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-book w-6"></i> Asignaturas
            </button>
            <button onclick="showModule('horarios-docente')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-calendar-alt w-6"></i> Horarios Docente
            </button>
            <button onclick="showModule('horarios-grado')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-users w-6"></i> Horarios Grado
            </button>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="content p-8">
        
        <!-- MÓDULO: INICIO -->
        <div id="inicio" class="module active">
            <div class="max-w-3xl mx-auto text-center mt-12">
                <h2 class="text-4xl font-black text-slate-800 mb-2 tracking-tight">¡Bienvenidos al sistema de horarios!</h2>
                <h3 class="text-3xl font-bold text-blue-600 italic mb-12">Institución Educativa San Miguel</h3>
                
                <div class="relative inline-block">
                    <div id="main-logo-container" class="w-64 h-64 bg-white rounded-3xl border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden shadow-xl hover:border-blue-400 transition-all">
                        <img id="main-logo-preview" src="" class="hidden w-full h-full object-contain p-4">
                        <div id="main-logo-placeholder" class="text-slate-300 flex flex-col items-center">
                            <i class="fas fa-image text-6xl mb-3"></i>
                            <p class="text-[10px] font-bold uppercase tracking-widest">Logo Institucional</p>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-center space-x-3">
                        <label for="logo-input" class="cursor-pointer bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wider hover:bg-blue-700 shadow-lg transition-all flex items-center">
                            <i class="fas fa-plus-circle mr-2"></i> Agregar Logo
                        </label>
                        <input type="file" id="logo-input" class="hidden" accept="image/*" onchange="handleImage(this)">
                        
                        <button onclick="triggerEdit()" id="btn-edit" class="hidden bg-white text-slate-700 px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wider hover:bg-slate-50 shadow shadow-slate-200 transition-all flex items-center border border-slate-200">
                            <i class="fas fa-edit mr-2 text-blue-500"></i> Editar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MÓDULO: DOCENTES -->
        <div id="docentes" class="module">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-slate-800 mb-6">Módulo de Docentes</h2>
                <div class="h-48 bg-slate-50 rounded-xl border border-dashed border-slate-200 flex items-center justify-center text-slate-400 text-sm italic">
                    Configurando tabla de docentes...
                </div>
            </div>
        </div>

        <!-- OTROS MÓDULOS -->
        <div id="asignaturas" class="module"> <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100"><h2 class="text-2xl font-bold text-slate-800">Módulo de Asignaturas</h2></div> </div>
        <div id="horarios-docente" class="module"> <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100"><h2 class="text-2xl font-bold text-slate-800">Horarios por Docente</h2></div> </div>
        <div id="horarios-grado" class="module"> <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100"><h2 class="text-2xl font-bold text-slate-800">Horarios por Grado</h2></div> </div>

    </main>

    <script>
        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    applyLogo(imageData);
                    localStorage.setItem('sanMiguelLogo', imageData);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function applyLogo(data) {
            const mainPreview = document.getElementById('main-logo-preview');
            const mainPlaceholder = document.getElementById('main-logo-placeholder');
            const miniPreview = document.getElementById('mini-logo-preview');
            const miniIcon = document.getElementById('mini-logo-icon');
            const btnEdit = document.getElementById('btn-edit');

            if (data) {
                mainPreview.src = data;
                mainPreview.classList.remove('hidden');
                mainPlaceholder.classList.add('hidden');
                miniPreview.src = data;
                miniPreview.classList.remove('hidden');
                miniIcon.classList.add('hidden');
                btnEdit.classList.remove('hidden');
            }
        }

        function triggerEdit() {
            document.getElementById('logo-input').click();
        }

        // Cargar logo al iniciar la página
        document.addEventListener('DOMContentLoaded', () => {
            const savedLogo = localStorage.getItem('sanMiguelLogo');
            if (savedLogo) {
                applyLogo(savedLogo);
            }
        });
    </script>
</body>
</html>
