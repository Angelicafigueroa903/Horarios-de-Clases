<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IE San Miguel - Gestión de Horarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .module { display: none; }
        .module.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px ); } to { opacity: 1; transform: translateY(0); } }
        .sidebar { width: 260px; position: fixed; right: 0; top: 0; height: 100vh; z-index: 50; }
        .content { margin-right: 260px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        /* Ajuste para que los otros módulos no estén centrados verticalmente si no quieres */
        .module:not(#inicio) { width: 100%; align-self: flex-start; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <!-- MENÚ LATERAL DERECHO -->
    <nav class="sidebar bg-slate-900 text-white p-6 shadow-2xl flex flex-col">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-full mx-auto mb-3 flex items-center justify-center shadow-lg">
                <i class="fas fa-school text-white text-2xl"></i>
            </div>
            <h1 class="text-[10px] font-bold text-blue-400 tracking-widest uppercase">IE San Miguel</h1>
        </div>

        <div class="space-y-2">
            <button onclick="showModule('inicio')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-home w-6"></i> Inicio
            </button>
            <button onclick="showModule('docentes')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-user-tie w-6"></i> Docentes
            </button>
            <button onclick="showModule('asignaturas')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-book w-6"></i> Asignaturas
            </button>
            <button onclick="showModule('horarios-docente')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-calendar-alt w-6"></i> Horarios Docente
            </button>
            <button onclick="showModule('horarios-grado')" class="w-full flex items-center p-3 rounded-lg hover:bg-blue-600 transition-all text-sm group">
                <i class="fas fa-users w-6"></i> Horarios Grado
            </button>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="content p-8">
        
        <!-- MÓDULO: INICIO (CENTRADO TOTALMENTE) -->
        <div id="inicio" class="module active w-full">
            <div class="max-w-4xl mx-auto text-center">
                <h2 class="text-4xl font-black text-slate-800 mb-4 tracking-tight">¡Bienvenidos al sistema de horarios!</h2>
                <h3 class="text-3xl font-bold text-blue-600 italic mb-6">Institución Educativa San Miguel</h3>
                <div class="w-24 h-1 bg-blue-500 mx-auto rounded-full"></div>
            </div>
        </div>

        <!-- MÓDULO: DOCENTES -->
        <div id="docentes" class="module max-w-5xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Módulo de Docentes</h2>
                        <p class="text-xs text-gray-500 italic">Gestión de planta docente</p>
                    </div>
                    <button onclick="toggleDocenteForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700 transition-all">
                        <i class="fas fa-plus mr-2"></i> Agregar Docente
                    </button>
                </div>

                <div id="docente-form" class="hidden bg-slate-50 p-6 rounded-xl mb-8 border border-slate-200">
                    <h3 class="font-bold mb-4 text-slate-700 text-sm uppercase">Nuevo Registro</h3>
                    <div class="grid md:grid-cols-3 gap-4">
                        <input type="text" id="doc-id" placeholder="N° Documento" class="p-2 border rounded text-sm">
                        <input type="text" id="doc-name" placeholder="Nombre Completo" class="p-2 border rounded text-sm">
                        <input type="text" id="doc-subject" placeholder="Asignatura" class="p-2 border rounded text-sm">
                        <input type="text" id="doc-grades" placeholder="Grados" class="p-2 border rounded text-sm">
                        <input type="number" id="doc-hours" placeholder="Horas" class="p-2 border rounded text-sm">
                        <button onclick="saveDocente()" class="bg-green-600 text-white p-2 rounded font-bold text-sm hover:bg-green-700">Guardar</button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="bg-slate-100 text-slate-500 text-[10px] uppercase tracking-widest border-b">
                                <th class="p-4">Documento</th>
                                <th class="p-4">Docente</th>
                                <th class="p-4">Asignatura</th>
                                <th class="p-4">Grados</th>
                                <th class="p-4 text-center">Horas</th>
                                <th class="p-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="docentes-table-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- OTROS MÓDULOS -->
        <div id="asignaturas" class="module max-w-5xl mx-auto"> 
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-slate-800">Módulo de Asignaturas</h2>
            </div> 
        </div>
        <div id="horarios-docente" class="module max-w-5xl mx-auto"> 
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-slate-800">Horarios por Docente</h2>
            </div> 
        </div>
        <div id="horarios-grado" class="module max-w-5xl mx-auto"> 
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-slate-800">Horarios por Grado</h2>
            </div> 
        </div>

    </main>

    <script>
        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Ajustar el centrado del contenedor principal
            const main = document.querySelector('.content');
            if (id === 'inicio') {
                main.style.alignItems = 'center';
            } else {
                main.style.alignItems = 'flex-start';
            }
        }

        // LÓGICA DE DOCENTES
        let docentes = JSON.parse(localStorage.getItem('sanMiguelDocentes')) || [];
        function toggleDocenteForm() { document.getElementById('docente-form').classList.toggle('hidden'); }
        function saveDocente() {
            const doc = {
                id: document.getElementById('doc-id').value,
                name: document.getElementById('doc-name').value,
                subject: document.getElementById('doc-subject').value,
                grades: document.getElementById('doc-grades').value,
                hours: document.getElementById('doc-hours').value
            };
            if(!doc.id || !doc.name) return alert("Completa los datos");
            docentes.push(doc);
            localStorage.setItem('sanMiguelDocentes', JSON.stringify(docentes));
            renderDocentes();
            toggleDocenteForm();
            document.querySelectorAll('#docente-form input').forEach(i => i.value = "");
        }
        function renderDocentes() {
            const body = document.getElementById('docentes-table-body');
            body.innerHTML = docentes.map((d, index) => `
                <tr class="hover:bg-gray-50 transition-all">
                    <td class="p-4 font-mono text-gray-500">${d.id}</td>
                    <td class="p-4 font-bold text-slate-700">${d.name}</td>
                    <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-[10px] font-bold">${d.subject}</span></td>
                    <td class="p-4 text-gray-600">${d.grades}</td>
                    <td class="p-4 text-center font-bold text-blue-600">${d.hours}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteDocente(${index})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        function deleteDocente(index) {
            if(confirm("¿Eliminar?")) {
                docentes.splice(index, 1);
                localStorage.setItem('sanMiguelDocentes', JSON.stringify(docentes));
                renderDocentes();
            }
        }
        window.onload = () => { renderDocentes(); };
    </script>
</body>
</html>
